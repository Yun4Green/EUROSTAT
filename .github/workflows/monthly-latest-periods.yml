name: Monthly Latest Period Check

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  latest-periods:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Refresh latest period snapshot
        run: python -m eurostat_pipeline latest-periods

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/metadata/latest_periods.csv; then
            echo "No latest-period changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/metadata/latest_periods.csv
          git commit -m "chore: refresh latest periods"
          git push
